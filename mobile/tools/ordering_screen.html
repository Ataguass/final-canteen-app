<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

<body class="bg-surface font-body-md text-on-surface h-full overflow-hidden">
<!-- Background Illustration Layer -->
<div class="fixed inset-0 bg-illustration z-0 pointer-events-none"></div>
<!-- Main Onboarding Container -->
<main class="relative z-10 flex flex-col h-full max-w-md mx-auto px-margin-mobile">
<!-- Top Navigation Area (Implicit) -->
<header class="flex justify-between items-center w-full h-14 pt-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">CampusCrave</span>
</div>
<button class="font-label-lg text-label-lg text-secondary hover:opacity-80 transition-opacity">Skip</button>
</header>
<!-- Central Content Area -->
<section class="flex-grow flex flex-col items-center justify-center pt-8">
<!-- Floating Smartphone Illustration -->
<div class="relative w-full aspect-[4/5] flex items-center justify-center mb-stack-lg">
<div class="animate-float relative z-20 w-56 h-[460px] bg-inverse-surface rounded-[40px] p-3 border-[6px] border-surface-container-highest shadow-2xl overflow-hidden">
<!-- Phone Screen Content -->
<div class="bg-white h-full w-full rounded-[28px] overflow-hidden flex flex-col">
<div class="p-4 flex flex-col gap-3">
<div class="w-full h-32 bg-primary-container rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div class="space-y-2">
<div class="h-4 w-3/4 bg-surface-container-high rounded-full"></div>
<div class="h-4 w-1/2 bg-surface-container-high rounded-full"></div>
</div>
<!-- Mock Order Button -->
<div class="mt-4 p-3 bg-primary-container rounded-full flex items-center justify-center shadow-lg">
<div class="h-2 w-12 bg-white/40 rounded-full"></div>
</div>
</div>
<div class="mt-auto p-4 border-t border-outline-variant flex justify-around">
<span class="material-symbols-outlined text-primary">home</span>
<span class="material-symbols-outlined text-secondary">search</span>
<span class="material-symbols-outlined text-secondary">shopping_cart</span>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="absolute w-64 h-64 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 border-2 border-primary/10 rounded-full -z-10"></div>
</div>
<!-- Text Content -->
<div class="text-center space-y-stack-md px-2">
<h1 class="font-headline-xl text-headline-xl text-on-surface">Order in Seconds</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto leading-relaxed">
                    Save your favorites and reorder with a single tap for ultimate convenience.
                </p>
</div>
</section>
<!-- Footer Actions -->
<footer class="pb-12 pt-8 flex flex-col items-center gap-8">
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Next Button -->
<button class="group relative w-full h-14 bg-primary-container text-white font-headline-md text-headline-md rounded-2xl shadow-[0_4px_12px_rgba(255,107,0,0.3)] flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all duration-200" onclick="window.location.reload()">
<span>Next</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button.group');
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
