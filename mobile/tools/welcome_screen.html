<style>
        body {

            background-color: #f8f9fa;

        .app-canvas {
            max-width: 430px;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #f8f9fa;
            overflow-x: hidden;
        }
        .bento-decoration {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(98, 0, 238, 0.08) 0%, rgba(248, 249, 250, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('main > div, main > h1, main > p, footer');
            elements.forEach((el, index) => {
                if (!el.classList.contains('animate-float')) {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(10px)';
                    el.style.transition = `all 0.6s cubic-bezier(0.16, 1, 0.3, 1) ${index * 0.1}s`;
                    
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    }, 100);
                }
            });
        });
    </script>
